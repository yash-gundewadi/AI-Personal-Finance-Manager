<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceAI | Login</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
      body {
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
      }
      .auth-card {
          width: 100%;
          max-width: 450px;
          padding: 3rem;
      }
  </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="glass-card auth-card animate-slide-up">
        
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3" style="width: 60px; height: 60px; font-size: 24px; box-shadow: var(--shadow-glow);">
                <i class="fa-solid fa-chart-line"></i>
            </div>
            <h2 class="fw-bold mb-1">Welcome Back</h2>
            <p class="text-muted">Sign in to continue to FinanceAI</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main);">
                        {{ message }}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="mb-3">
                <label class="form-label text-muted">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text bg-dark text-white border-secondary"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" name="email" class="form-control bg-dark text-white border-secondary" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between">
                    <label class="form-label text-muted">Password</label>
                    <a href="#" class="text-decoration-none small text-primary-light">Forgot Password?</a>
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-dark text-white border-secondary"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" placeholder="Enter your password" required>
                </div>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input bg-dark border-secondary" type="checkbox" name="remember" id="rememberMe">
                <label class="form-check-label text-muted" for="rememberMe">
                    Remember me for 30 days
                </label>
            </div>

            <button type="submit" class="btn btn-primary-glow w-100 mb-4">
                Sign In <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>
        </form>

        <p class="text-center text-muted mb-0">
            Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-decoration-none text-primary-light fw-bold">Create one now</a>
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
